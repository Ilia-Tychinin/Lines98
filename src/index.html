<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Lines 98">
  <title>Lines 98</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png?v=2">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <header id="top-bar">
      <div class="score-group">
        <span class="label">SCORE</span>
        <span id="score">0</span>
        <button id="btn-new-game" aria-label="New Game">&#8635;</button>
      </div>
      <div class="next-group">
        <span class="label">NEXT</span>
        <div id="next-balls">
          <div class="next-ball"></div>
          <div class="next-ball"></div>
          <div class="next-ball"></div>
        </div>
      </div>
      <div class="best-group">
        <span class="label">BEST</span>
        <span id="best">0</span>
        <button id="btn-undo" disabled aria-label="Undo">&#8617;&#xFE0E;</button>
      </div>
    </header>

    <div id="update-banner" class="hidden">Update available — tap to reload</div>

    <div id="board-wrap">
      <div id="board"></div>
      <div id="build"></div>
    </div>

    <div id="overlay" class="hidden">
      <div id="overlay-card">
        <div id="overlay-title">GAME OVER</div>
        <div id="overlay-score-label">SCORE</div>
        <div id="overlay-score">0</div>
        <div id="overlay-hiscore" class="hidden">NEW HIGH SCORE!</div>
        <button id="overlay-new-game">Play Again</button>
      </div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
